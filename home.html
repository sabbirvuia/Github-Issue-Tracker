<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- title -->
    <title>GitHub Issues Tracker | Dashboard</title>

    <!-- favicon  -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- daisyUi + tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- custom css  -->
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <header>
      <nav class="bg-base-100 shadow-sm p-4">
        <div
          class="navbar bg-base-100 w-11/12 mx-auto flex flex-col gap-5 md:flex-row"
        >
          <div class="flex-1">
            <a class="flex items-center gap-2 text-lg lg:text-2xl"
              ><img
                width="36px"
                height="37px"
                src="./assets/github-logo.png"
                alt=""
              />
              GitHub Issues Tracker</a
            >
          </div>
          <div class="flex gap-2">
            <label class="input outline-none">
              <svg
                class="h-[1em] opacity-90 text-primary"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <g
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="4.5"
                  fill="none"
                  stroke="currentColor"
                >
                  <circle cx="11" cy="11" r="7"></circle>
                  <path d="m21 21-4.3-4.3"></path>
                </g>
              </svg>
              <input
                id="ipt-search"
                type="search"
                class="input outline-none w-24 md:w-auto"
                required
                placeholder="Search issues..."
              />
            </label>
            <button
              onclick="loadSearchIssues()"
              id="btn-search"
              class="btn btn-primary"
            >
              Search
            </button>
          </div>
        </div>
      </nav>
    </header>

    <section
      id="tab-section"
      class="w-10/12 mx-auto bg-white p-4 mt-10 rounded-lg flex justify-between items-center gap-3 shadow-md md:mt-15 md:p-8"
    >
      <div class="flex gap-4">
        <button
          id="btn-all"
          onclick="
            showfilterIssues('all');
            activeBtn('btn-all');
          "
          class="btn btn-xs rounded-md btn-md md:btn-md lg:btn-lg xl:btn-xl btn-primary"
        >
          All
        </button>
        <button
          id="btn-open"
          onclick="
            showfilterIssues('open');
            activeBtn('btn-open');
          "
          class="btn btn-xs rounded-md btn-md md:btn-md lg:btn-lg xl:btn-xl"
        >
          Open
        </button>
        <button
          id="btn-close"
          onclick="
            showfilterIssues('closed');
            activeBtn('btn-close');
          "
          class="btn btn-xs rounded-md btn-md md:btn-md lg:btn-lg xl:btn-xl"
        >
          Closed
        </button>
      </div>
      <div
        class="text-base font-semibold badge badge-soft bg-[#def6fc] text-[#007fa9] border-[#bbe5f7] p-3 py-4"
      >
        <i class="fa-solid fa-clock"></i>
        <span id="clock">00:00:00</span>
      </div>
    </section>

    <section>
      <div
        id="issues-bar"
        class="flex flex-col gap-5 justify-between w-10/12 mx-auto bg-white p-8 mt-2 rounded-lg border-b-2 border-gray-300 shadow-md md:flex-row mt-15"
      >
        <div class="flex justify-center items-center gap-3">
          <div
            class="bg-[#ECE4FF] rounded-full h-15 w-15 flex justify-center items-center md:h-17 w-18"
          >
            <img
              width="37px"
              height="37px"
              src="./assets/Aperture.png"
              alt=""
            />
          </div>
          <div class="items-center">
            <h2 class="tittle"><span id="issue-count">0</span> Issues</h2>
            <p class="subtittle md:text-nowrap">
              Track and manage your project issues
            </p>
          </div>
        </div>
        <div class="flex justify-center gap-3">
          <div class="flex gap-3 items-center">
            <p class="font-semibold">
              <span
                class="w-3 h-3 rounded-full bg-[#00A96E] inline-block"
              ></span>
              Open
            </p>
            <p class="font-semibold">
              <span
                class="w-3 h-3 rounded-full bg-[#a855f7] inline-block"
              ></span>
              Closed
            </p>
          </div>
        </div>
      </div>

      <div
        id="spinner"
        class="justify-center text-center col-span-4 mt-5 hidden"
      >
        <span
          class="loading loading-bars loading-xl bg-gradient-to-r from-[#0e00d3] via-[#00A96E] to-[#a855f7]"
        ></span>
      </div>

      <div
        id="issues-container"
        class="w-10/12 mx-auto bg-base-200 grid grid-cols-1 gap-3 shadow-md h-full p-5 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4"
      ></div>
    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="modal.showModal()">open modal</button> -->
    <dialog id="modal" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <h3 class="text-lg font-bold">Hello!</h3>
        <p class="py-4">Press ESC key or click the button below to close</p>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="./home.js"></script>
  </body>
</html>
